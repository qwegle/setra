<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="setra.sh — control plane for AI agent teams" />
    <title>setra.sh</title>
    <link rel="preconnect" href="https://fonts.bunny.net" />
    <link href="https://fonts.bunny.net/css?family=inter:400,500,600,700|jetbrains-mono:400,500|poppins:400,500,600,700|plus-jakarta-sans:400,500,600,700|dm-sans:400,500,600,700|outfit:400,500,600,700|ibm-plex-sans:400,500,600,700|roboto:400,500,700|lato:400,700|nunito:400,600,700|geist-mono:400,500" rel="stylesheet" />
    <script>
      // Apply saved theme before React mounts so the first paint matches the
      // user's preference (and the new cream default for fresh installs).
      // Mirrors SettingsPage's appearance:theme localStorage key.
      (function () {
        try {
          var raw = localStorage.getItem("setra:appearance:theme");
          var theme = raw ? JSON.parse(raw) : "light";
          var root = document.documentElement;
          if (theme === "system") {
            var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            root.classList.toggle("dark", prefersDark);
            root.classList.toggle("light", !prefersDark);
          } else if (theme === "dark") {
            root.classList.add("dark");
          } else {
            root.classList.add("light");
          }
        } catch (_) {
          document.documentElement.classList.add("light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
