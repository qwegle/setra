name: Docs Deploy

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/docs-deploy.yml'
  workflow_dispatch:

concurrency:
  group: docs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm --filter=@setra/docs build
        env:
          # Passed through to VitePress/Next so internal links resolve correctly
          DOCS_BASE_URL: ${{ vars.DOCS_BASE_URL || 'https://setra.sh/docs' }}

      # ── Vercel deployment (primary) ────────────────────────────────────────
      - name: Deploy to Vercel
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: docs
          vercel-args: ${{ github.ref_name == 'main' && '--prod' || '' }}

      # ── GitHub Pages fallback (if no Vercel token configured) ─────────────
      - name: Upload pages artifact
        if: ${{ secrets.VERCEL_TOKEN == '' }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy-pages:
    needs: deploy
    if: ${{ secrets.VERCEL_TOKEN == '' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
