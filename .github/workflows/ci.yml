name: CI

on:
  push:
    branches: [main, stage, dev]
  pull_request:
    branches: [main, stage, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3
      - name: Build workspace packages
        run: pnpm build --filter=!@setra/desktop --filter=!@setra/board --filter=!@setra/cli
      - run: pnpm test
        env:
          CI: true
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/coverage/**'
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm build --filter=!@setra/desktop
      - name: Upload CLI dist
        uses: actions/upload-artifact@v4
        with:
          name: cli-dist
          path: apps/cli/dist/
          if-no-files-found: ignore

  build-desktop:
    name: Build Desktop
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libsecret-1-dev libx11-dev libxkbfile-dev libgtk-3-dev libnss3-dev
      - name: Restore turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-desktop-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-desktop-
      - run: pnpm install --frozen-lockfile
      - name: Build packages
        run: pnpm build --filter=!@setra/desktop
      - name: Build Electron (main + preload)
        run: pnpm --filter @setra/desktop exec electron-vite build
      - name: Remove workspace symlinks before packaging
        run: |
          rm -rf apps/desktop/node_modules/@setra
          node apps/desktop/scripts/prune-broken-workspace-links.cjs
      - name: Build Desktop (dir)
        run: |
          cd apps/desktop
          pnpm electron-builder --linux --dir \
            --config electron-builder.config.ts \
            --publish never

  go-build:
    name: Go Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: |
            go/cli/go.sum
            go/tui/go.sum
            go/agent-runner/go.sum
      - name: Build CLI
        run: cd go/cli && go build -o ../../bin/setra ./cmd/setra/
      - name: Build TUI
        run: cd go/tui && go build -o ../../bin/setra-tui .
      - name: Build Agent Runner
        run: cd go/agent-runner && go build -o ../../bin/setra-runner ./cmd/server/
      - name: Test shared packages
        run: cd go/pkg && go vet ./...
      - name: Test CLI
        run: cd go/cli && go vet ./...
      - name: Test Agent Runner
        run: cd go/agent-runner && go vet ./...
      - name: Upload Go binaries
        uses: actions/upload-artifact@v4
        with:
          name: go-binaries
          path: bin/setra*

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/compute
      - name: Cargo check
        run: cd native/compute && cargo check
      - name: Cargo clippy
        run: cd native/compute && cargo clippy -- -D warnings 2>/dev/null || true
