name: Desktop Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag to release (e.g. v0.1.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ── Resolve the tag ──────────────────────────────────────────────────────────
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"

  # ── macOS (universal: arm64 + x64) ──────────────────────────────────────────
  build-macos:
    needs: resolve-version
    runs-on: macos-14          # Apple Silicon runner
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter=!@setra/desktop

      - name: Remove workspace symlinks before packaging
        run: |
          rm -rf apps/desktop/node_modules/@setra
          node apps/desktop/scripts/prune-broken-workspace-links.cjs

      # ── Code signing setup ─────────────────────────────────────────────────
      - name: Import Apple Developer certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "setra-build" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "setra-build" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "setra-build" "$KEYCHAIN_PATH"

      # ── Build .dmg + .zip (universal) ──────────────────────────────────────
      - name: Build macOS universal
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: ${{ runner.temp }}/build.keychain
          CSC_KEY_PASSWORD: setra-build
        run: |
          cd apps/desktop
          pnpm electron-builder \
            --mac \
            --universal \
            --config electron-builder.config.ts \
            --publish never

      - name: Notarize macOS builds
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for f in apps/desktop/dist/*.dmg apps/desktop/dist/*.zip; do
            [ -f "$f" ] || continue
            echo "Notarizing $f …"
            xcrun notarytool submit "$f" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$f" || true   # zip files don't get stapled
          done

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
            apps/desktop/dist/latest-mac.yml
          if-no-files-found: error

  # ── Linux ────────────────────────────────────────────────────────────────────
  build-linux:
    needs: resolve-version
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            rpm \
            snapd \
            libsecret-1-dev \
            libx11-dev \
            libxkbfile-dev \
            libgtk-3-dev \
            libnss3-dev

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter=!@setra/desktop

      - name: Remove workspace symlinks before packaging
        run: |
          rm -rf apps/desktop/node_modules/@setra
          node apps/desktop/scripts/prune-broken-workspace-links.cjs

      - name: Build Linux (x64)
        run: |
          cd apps/desktop
          pnpm electron-builder \
            --linux deb rpm AppImage snap \
            --x64 \
            --config electron-builder.config.ts \
            --publish never

      - name: Build Linux (arm64)
        run: |
          cd apps/desktop
          pnpm electron-builder \
            --linux deb AppImage \
            --arm64 \
            --config electron-builder.config.ts \
            --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          path: |
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.rpm
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.snap
            apps/desktop/dist/latest-linux.yml
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-windows:
    needs: resolve-version
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build --filter=!@setra/desktop

      - name: Remove workspace symlinks before packaging
        run: |
          rm -rf apps/desktop/node_modules/@setra
          node apps/desktop/scripts/prune-broken-workspace-links.cjs
        shell: bash

      - name: Build Windows (x64)
        run: |
          cd apps/desktop
          pnpm electron-builder `
            --win nsis msi `
            --x64 `
            --config electron-builder.config.ts `
            --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.msi
            apps/desktop/dist/latest.yml
          if-no-files-found: error

  # ── Publish ───────────────────────────────────────────────────────────────────
  publish:
    needs: [resolve-version, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Flatten artifact directories
        run: |
          mkdir -p dist
          find release-assets -type f | while read f; do
            cp "$f" dist/
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: setra v${{ env.VERSION }}
          draft: ${{ github.event.inputs.draft == 'true' }}
          generate_release_notes: true
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Upload to S3 auto-update bucket ───────────────────────────────────
      - name: Configure AWS credentials
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}

      - name: Upload to S3 (auto-update server)
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        run: |
          S3_BUCKET="${{ secrets.S3_RELEASE_BUCKET }}"
          VERSION="${{ env.VERSION }}"

          # Upload versioned artifacts
          aws s3 sync dist/ "s3://$S3_BUCKET/releases/v$VERSION/" \
            --exclude "*.blockmap" \
            --acl public-read

          # Update latest-* yml files at root (used by electron-updater)
          for yml in dist/latest-mac.yml dist/latest-linux.yml dist/latest.yml; do
            [ -f "$yml" ] && aws s3 cp "$yml" "s3://$S3_BUCKET/" --acl public-read
          done

          echo "Published v$VERSION to s3://$S3_BUCKET"
