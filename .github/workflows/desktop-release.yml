name: Desktop Release Build

# Builds unsigned Electron desktop installers for macOS (.dmg) and Windows
# (.exe) for sharing test builds with teammates.
#
# Triggers:
#  * workflow_dispatch — outputs are 14-day workflow artifacts.
#  * push of a tag matching desktop-v* or v* — drafts a GitHub Release with
#    both installers attached.

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS .dmg
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Build workspace dependencies (packages/*)
        run: pnpm --filter "./packages/*" build
      - name: Build desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @setra/desktop build
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: setra-mac
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
          retention-days: 14
          if-no-files-found: error
      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
          draft: true
          generate_release_notes: true

  build-win:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false
      - name: Build workspace dependencies (packages/*)
        run: pnpm --filter "./packages/*" build
      - name: Build desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @setra/desktop build
      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: setra-win
          path: |
            apps/desktop/dist/*.exe
          retention-days: 14
          if-no-files-found: error
      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist/*.exe
          draft: true
          generate_release_notes: true
