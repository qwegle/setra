name: Homebrew Tap Update

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v (e.g. 0.1.0)"
        required: true
      tap_repo:
        description: "Homebrew tap repository owner/name"
        required: false
        default: "nitikeshq/homebrew-setra"

jobs:
  update-tap:
    runs-on: ubuntu-latest
    if: ${{ secrets.HOMEBREW_TAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + tap repo
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            VERSION="${TAG#v}"
            TAP_REPO="nitikeshq/homebrew-setra"
          else
            VERSION="${{ github.event.inputs.version }}"
            TAP_REPO="${{ github.event.inputs.tap_repo }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tap_repo=$TAP_REPO" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$RUNNER_TEMP/assets"
          gh release download "v${{ steps.meta.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --dir "$RUNNER_TEMP/assets" \
            --pattern "setra-${{ steps.meta.outputs.version }}-darwin-arm64.tar.gz" \
            --pattern "setra-${{ steps.meta.outputs.version }}-darwin-x64.tar.gz" \
            --pattern "setra-${{ steps.meta.outputs.version }}-linux-arm64.tar.gz" \
            --pattern "setra-${{ steps.meta.outputs.version }}-linux-x64.tar.gz"

      - name: Update formula checksums
        run: |
          chmod +x scripts/update-homebrew-formula.sh
          scripts/update-homebrew-formula.sh "${{ steps.meta.outputs.version }}" "$RUNNER_TEMP/assets"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.meta.outputs.tap_repo }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit and push formula update
        run: |
          mkdir -p tap/Formula
          cp Formula/setra.rb tap/Formula/setra.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/setra.rb
          git diff --staged --quiet || git commit -m "chore: update setra formula v${{ steps.meta.outputs.version }}"
          git push

