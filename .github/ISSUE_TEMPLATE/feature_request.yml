name: Feature Request
description: Suggest something new or an improvement
title: "[feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great. Describe what problem you're trying to solve and
        the solution you'd like. Concrete beats abstract every time.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Describe the workflow pain-point. "I'm always frustrated when..."
        is a fine way to start.
      placeholder: |
        When I run setra on a large monorepo I have to manually specify which
        packages to include. There's no way to give it a reusable "scope" config.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketches, examples, or pseudocode welcome.
      placeholder: |
        A `setra.config.ts` file at the repo root with a `scope` field that
        lets me whitelist directories or packages.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Which area does this touch?
      options:
        - Agent adapters (Claude, GPT, Gemini, local …)
        - Memory / context
        - Desktop UI
        - CLI
        - Modules (file, shell, browser …)
        - Cloud runner
        - Auto-update / release
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds you currently use, or other approaches that don't quite fit.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, prior art, related issues.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this hasn't been requested before
          required: true
        - label: I'm willing to help implement this (optional — just good to know)
          required: false
